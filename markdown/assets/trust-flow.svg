<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
  <rect width="1280" height="560" fill="#f4f5f6"/>
  <text x="46" y="55" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#10202f">Trust And Abnormal Situation Flow</text>
  <text x="46" y="84" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#44515c">ConfidenceOS turns raw sensor uncertainty into an operating basis and an action contract.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>
  <g font-family="Arial, Helvetica, sans-serif">
    <g fill="#fff" stroke="#8d969d" stroke-width="2">
      <rect x="52" y="136" width="210" height="96" rx="8"/>
      <rect x="316" y="136" width="210" height="96" rx="8"/>
      <rect x="580" y="136" width="210" height="96" rx="8"/>
      <rect x="844" y="136" width="210" height="96" rx="8"/>
      <rect x="316" y="330" width="210" height="96" rx="8"/>
      <rect x="580" y="330" width="210" height="96" rx="8"/>
      <rect x="844" y="330" width="210" height="96" rx="8"/>
    </g>
    <g fill="#111820">
      <text x="76" y="170" font-size="16" font-weight="700">Sensor Readings</text>
      <text x="76" y="202" font-size="13">LT/FI/FO/PT/TT/ZT</text>
      <text x="340" y="170" font-size="16" font-weight="700">Confidence Rubric</text>
      <text x="340" y="202" font-size="13">calibration, stability</text>
      <text x="340" y="222" font-size="13">cross-sensor, plausibility</text>
      <text x="604" y="170" font-size="16" font-weight="700">Mass Balance</text>
      <text x="604" y="202" font-size="13">flow-implied level</text>
      <text x="604" y="222" font-size="13">contradiction detection</text>
      <text x="868" y="170" font-size="16" font-weight="700">Trust Quarantine</text>
      <text x="868" y="202" font-size="13">do not use as basis</text>
      <text x="868" y="222" font-size="13">substitute available</text>
      <text x="340" y="364" font-size="16" font-weight="700">Alarm Collapse</text>
      <text x="340" y="396" font-size="13">one abnormal situation</text>
      <text x="604" y="364" font-size="16" font-weight="700">Operating Basis</text>
      <text x="604" y="396" font-size="13">what is trusted now</text>
      <text x="868" y="364" font-size="16" font-weight="700">Action Contract</text>
      <text x="868" y="396" font-size="13">single safe move</text>
      <text x="868" y="416" font-size="13">decision freeze</text>
    </g>
    <g stroke="#555" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
      <path d="M262 184 H316"/>
      <path d="M526 184 H580"/>
      <path d="M790 184 H844"/>
      <path d="M949 232 V330"/>
      <path d="M844 378 H790"/>
      <path d="M580 378 H526"/>
    </g>
  </g>
</svg>
