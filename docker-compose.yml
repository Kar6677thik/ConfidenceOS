services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/data/confidenceos.db}
      - CONFIDENCEOS_JWT_SECRET=${CONFIDENCEOS_JWT_SECRET:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai_compatible}
      - OPENAI_COMPATIBLE_API_KEY=${OPENAI_COMPATIBLE_API_KEY:-}
      - OPENAI_COMPATIBLE_BASE_URL=${OPENAI_COMPATIBLE_BASE_URL:-https://aicredits.in/v1}
      - OPENAI_COMPATIBLE_MODEL=${OPENAI_COMPATIBLE_MODEL:-anthropic/claude-3.5-haiku}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-5174}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-data:
